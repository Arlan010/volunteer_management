{% extends 'base.html' %}
{% load i18n %}
{% load static %}
{% load main_tags %}
{% block content %}
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAOejwdWec0_6Fmi5u__aub-ggElulNAb4&callback=initMap"></script>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>


<style>
	#map {
		height: 640px;
		width: 100%;
	}

	.map-modal {
		display: none;
		position: fixed;
		left: 50%;
		top: 50%;
		z-index: 100;
		width: min(92vw, 520px);
		transform: translate(-50%, -50%);
	}
</style>

<section class="px-4 pb-20 pt-32">
	<div class="mx-auto max-w-6xl">
		<div class="mb-8">
			<div class="badge badge-outline border-accent text-accent">{% trans "Карта" %}</div>
			<h1 class="mt-4 text-4xl font-bold tracking-tight text-foreground">{% trans "Жобалар картасы" %}</h1>
			<p class="mt-3 max-w-2xl text-muted-foreground">
				{% trans "Жобалардың орналасуын картадан көріңіз немесе жаңа нүкте қосыңыз." %}
			</p>
		</div>

		<div class="overflow-hidden rounded-2xl border border-border/50 bg-card shadow-xl shadow-primary/5">
			<div id="map"></div>
		</div>
	</div>
</section>

<div id="projectModal" class="map-modal">
	<div class="card border border-border/50 bg-card shadow-2xl">
		<div class="card-body">
			<button type="button" class="btn btn-ghost btn-sm absolute right-3 top-3" onclick="$('#projectModal').hide();">✕</button>
			<h2 id="modalTitle" class="card-title pr-8"></h2>
			<p id="modalDescription" class="text-sm leading-relaxed text-muted-foreground"></p>
			<div class="mt-3 space-y-2 text-sm text-muted-foreground">
				<p id="modalDate"></p>
				<p id="modalStatus"></p>
			</div>
		</div>
	</div>
</div>

<div id="modal" class="map-modal">
	<div class="card border border-border/50 bg-card shadow-2xl">
		<div class="card-body">
			<button type="button" class="btn btn-ghost btn-sm absolute right-3 top-3" onclick="$('#modal').hide();">✕</button>
			<h2 class="card-title">{% trans "Жаңа ерікті жоба" %}</h2>
			<div class="grid gap-4">
				<label class="form-control">
					<span class="label-text">{% trans "Атауы" %}</span>
					<input type="text" id="title" class="input input-bordered">
				</label>
				<label class="form-control">
					<span class="label-text">{% trans "Сипаттама" %}</span>
					<textarea id="description" class="textarea textarea-bordered min-h-28"></textarea>
				</label>
				<div class="grid gap-4 sm:grid-cols-2">
					<label class="form-control">
						<span class="label-text">{% trans "Ендік" %}</span>
						<input type="text" id="latitude" class="input input-bordered" readonly>
					</label>
					<label class="form-control">
						<span class="label-text">{% trans "Бойлық" %}</span>
						<input type="text" id="longitude" class="input input-bordered" readonly>
					</label>
				</div>
				<label class="form-control">
					<span class="label-text">{% trans "Басталу күні" %}</span>
					<input type="date" id="start_date" class="input input-bordered">
				</label>
				<label class="form-control">
					<span class="label-text">{% trans "Мәртебесі" %}</span>
					<select id="status" class="select select-bordered">
						<option value="current">{% trans "Ағымдағы" %}</option>
						<option value="not_current">{% trans "Өзекті емес" %}</option>
					</select>
				</label>
				<button type="button" onclick="saveProject()" class="btn btn-primary">{% trans "Сақтау" %}</button>
			</div>
		</div>
	</div>
</div>

<script>
    var projects = {{ projects|safe }};

    function initMap() {
        var customMapStyle = [
    {
        "elementType": "geometry",
        "stylers": [
            {
                "color": "#f5f5f5"
            }
        ]
    },
    {
        "elementType": "labels.icon",
        "stylers": [
            {
                "visibility": "off"
            }
        ]
    },
    {
        "elementType": "labels.text.fill",
        "stylers": [
            {
                "color": "#616161"
            }
        ]
    },
    {
        "elementType": "labels.text.stroke",
        "stylers": [
            {
                "color": "#f5f5f5"
            }
        ]
    },
    {
        "featureType": "administrative.land_parcel",
        "elementType": "labels.text.fill",
        "stylers": [
            {
                "color": "#bdbdbd"
            }
        ]
    },
    {
        "featureType": "poi",
        "elementType": "geometry",
        "stylers": [
            {
                "color": "#eeeeee"
            }
        ]
    },
    {
        "featureType": "poi",
        "elementType": "labels.text.fill",
        "stylers": [
            {
                "color": "#757575"
            }
        ]
    },
    {
        "featureType": "poi.park",
        "elementType": "geometry",
        "stylers": [
            {
                "color": "#e5e5e5"
            }
        ]
    },
    {
        "featureType": "poi.park",
        "elementType": "labels.text.fill",
        "stylers": [
            {
                "color": "#9e9e9e"
            }
        ]
    },
    {
        "featureType": "road",
        "elementType": "geometry",
        "stylers": [
            {
                "color": "#ffffff"
            }
        ]
    },
    {
        "featureType": "road.arterial",
        "elementType": "labels.text.fill",
        "stylers": [
            {
                "color": "#757575"
            }
        ]
    },
    {
        "featureType": "road.highway",
        "elementType": "geometry",
        "stylers": [
            {
                "color": "#dadada"
            }
        ]
    },
    {
        "featureType": "road.highway",
        "elementType": "labels.text.fill",
        "stylers": [
            {
                "color": "#616161"
            }
        ]
    },
    {
        "featureType": "road.local",
        "elementType": "labels.text.fill",
        "stylers": [
            {
                "color": "#9e9e9e"
            }
        ]
    },
    {
        "featureType": "transit.line",
        "elementType": "geometry",
        "stylers": [
            {
                "color": "#e5e5e5"
            }
        ]
    },
    {
        "featureType": "transit.station",
        "elementType": "geometry",
        "stylers": [
            {
                "color": "#eeeeee"
            }
        ]
    },
    {
        "featureType": "water",
        "elementType": "geometry",
        "stylers": [
            {
                "color": "#c9c9c9"
            }
        ]
    },
    {
        "featureType": "water",
        "elementType": "labels.text.fill",
        "stylers": [
            {
                "color": "#9e9e9e"
            }
        ]
    }
];

        var map = new google.maps.Map(document.getElementById('map'), {
            zoom: 14,
            center: {lat: 43.240150, lng: 76.887024},
            styles: customMapStyle
        });

        {% for project in projects %}
          var location = {lat: {{ project.latitude }}, lng: {{ project.longitude }}};
          var marker = new google.maps.Marker({
            position: location,
            map: map,
            title: '{{ project.title|escapejs }}',
            icon: {
              url: 'https://granidobra.ru/wp-content/uploads/2016/10/hands-with-heart.jpg',
              scaledSize: new google.maps.Size(50, 50)
            }
          });

          // Обработчик события клика на маркер
          marker.addListener('click', function() {
            document.getElementById('modalTitle').textContent = '{{ project.title|escapejs }}';
            document.getElementById('modalDescription').textContent = '{{ project.comment|default:""|escapejs }}';
            document.getElementById('modalDate').textContent = 'Басталуы: {{ project.start_date|date:"d M Y" }}';
            document.getElementById('modalStatus').textContent = 'Статус: {{ project.status }}';
            $('#projectModal').show();
          });
        {% endfor %}

        map.addListener('click', function(e) {
            $('#latitude').val(e.latLng.lat());
            $('#longitude').val(e.latLng.lng());
            $('#modal').show();
        });
    }

    function saveProject() {
        var projectData = {
            title: $('#title').val(),
            description: $('#description').val(),
            latitude: $('#latitude').val(),
            longitude: $('#longitude').val(),
            start_date: $('#start_date').val(),
            status: $('#status').val(),
        };

        $.ajax({
            url: '/ru/organization/projects/map',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(projectData),
            success: function(response) {
                alert('Жоба сақталды. ID: ' + response.id);
                $('#modal').hide();
                location.reload();  // Перезагрузить карту, чтобы показать новый проект
            },
            error: function() {
                alert('Жобаны сақтау кезінде қате пайда болды');
            }
        });
    }

    google.maps.event.addDomListener(window, 'load', initMap);
</script>
{% endblock %}
