{% extends 'base.html' %}
{% load i18n %}
{% block content %}
<link
	rel="stylesheet"
	href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
	integrity="sha256-p4NxAoJBhIINfQ4dnZPJT5mIAdyw6h8hZy3zj8zskpM="
	crossorigin=""
>
<script
	src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
	integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
	crossorigin=""
></script>

<style>
	#map {
		height: 640px;
		width: 100%;
	}
</style>

<section class="px-4 pb-20 pt-32">
	<div class="mx-auto max-w-6xl">
		<div class="mb-8">
			<div class="badge badge-outline border-accent text-accent">{% trans "Карта" %}</div>
			<h1 class="mt-4 text-4xl font-bold tracking-tight text-foreground">{% trans "Жобалар картасы" %}</h1>
			<p class="mt-3 max-w-2xl text-muted-foreground">
				{% trans "Координаттары көрсетілген волонтерлік жобаларды картадан қараңыз." %}
			</p>
		</div>

		<div class="overflow-hidden rounded-2xl border border-border/50 bg-card shadow-xl shadow-primary/5">
			<div id="map"></div>
		</div>
	</div>
</section>

<script>
	const map = L.map('map').setView([43.240150, 76.887024], 12);
	const markerBounds = [];

	L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 19,
		attribution: '&copy; OpenStreetMap contributors'
	}).addTo(map);

	{% for project in projects %}
		{% if project.latitude and project.longitude %}
			{
				const position = [{{ project.latitude }}, {{ project.longitude }}];
				const popup = `
					<strong>{{ project.title|escapejs }}</strong>
					{% if project.location %}<br>{{ project.location|escapejs }}{% endif %}
					{% if project.comment %}<br>{{ project.comment|truncatechars:140|escapejs }}{% endif %}
					{% if project.start_date %}<br>{% trans "Басталуы" %}: {{ project.start_date|date:"d.m.Y" }}{% endif %}
				`;

				L.marker(position).addTo(map).bindPopup(popup);
				markerBounds.push(position);
			}
		{% endif %}
	{% endfor %}

	if (markerBounds.length > 0) {
		map.fitBounds(markerBounds, { padding: [40, 40], maxZoom: 14 });
	}
</script>
{% endblock %}
