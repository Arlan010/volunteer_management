{% extends 'base.html' %}
{% load i18n %}
{% block content %}
<link
	rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
>
<script
	src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
></script>

<style>
	#map {
		height: min(640px, 72vh);
		min-height: 420px;
		width: 100%;
		z-index: 1;
	}

	.map-state {
		display: none;
	}

	.map-state.is-visible {
		display: block;
	}
</style>

<section class="px-4 pb-20 pt-32">
	<div class="mx-auto max-w-6xl">
		<div class="mb-8">
			<div class="badge badge-outline border-accent text-accent">{% trans "Карта" %}</div>
			<h1 class="mt-4 text-4xl font-bold tracking-tight text-foreground">{% trans "Жобалар картасы" %}</h1>
			<p class="mt-3 max-w-2xl text-muted-foreground">
				{% trans "Координаттары көрсетілген волонтерлік жобаларды картадан қараңыз." %}
			</p>
		</div>

		<div id="map-message" class="map-state mb-4 rounded-xl border border-border bg-card p-4 text-muted-foreground"></div>
		<div class="overflow-hidden rounded-2xl border border-border/50 bg-card shadow-xl shadow-primary/5">
			<div id="map"></div>
		</div>
	</div>
</section>

{{ project_markers|json_script:"project-markers" }}

<script>
	document.addEventListener('DOMContentLoaded', function () {
		const mapElement = document.getElementById('map');
		const messageElement = document.getElementById('map-message');
		const markerDataElement = document.getElementById('project-markers');
		const markers = markerDataElement ? JSON.parse(markerDataElement.textContent) : [];

		function showMapMessage(message) {
			if (!messageElement) return;
			messageElement.textContent = message;
			messageElement.classList.add('is-visible');
		}

		function escapeHtml(value) {
			return String(value || '').replace(/[&<>"']/g, function (character) {
				return {
					'&': '&amp;',
					'<': '&lt;',
					'>': '&gt;',
					'"': '&quot;',
					"'": '&#39;'
				}[character];
			});
		}

		if (!mapElement) return;

		if (typeof L === 'undefined') {
			showMapMessage('Картаны жүктеу мүмкін болмады. Интернет байланысын тексеріп, бетті қайта жаңартыңыз.');
			return;
		}

		const map = L.map(mapElement, {
			scrollWheelZoom: true,
		}).setView([51.169392, 71.449074], 12);
		const markerBounds = [];

		L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
			maxZoom: 19,
			attribution: '&copy; OpenStreetMap contributors'
		}).addTo(map);

		markers.forEach(function (project) {
			const latitude = Number(project.latitude);
			const longitude = Number(project.longitude);

			if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) return;

			const position = [latitude, longitude];
			const popupParts = [
				'<strong>' + escapeHtml(project.title) + '</strong>',
				escapeHtml(project.location),
				escapeHtml(project.comment),
				project.start_date ? 'Басталуы: ' + escapeHtml(project.start_date) : '',
			].filter(Boolean);

			L.marker(position).addTo(map).bindPopup(popupParts.join('<br>'));
			markerBounds.push(position);
		});

		if (markerBounds.length > 0) {
			map.fitBounds(markerBounds, { padding: [40, 40], maxZoom: 14 });
		} else {
			showMapMessage('Картада көрсетуге болатын координаттары бар жобалар әлі жоқ.');
		}

		window.setTimeout(function () {
			map.invalidateSize();
		}, 150);
	});
</script>
{% endblock %}
