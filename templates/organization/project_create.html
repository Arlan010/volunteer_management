{% extends 'base.html' %}
{% load widget_tweaks %}
{% load i18n %}

{% block content %}
<section class="px-4 pb-20 pt-32">
	<div class="mx-auto max-w-3xl">
		<div class="card border border-border/50 bg-card shadow-xl shadow-primary/5">
			<div class="card-body">
				<h1 class="text-3xl font-bold tracking-tight text-foreground">{% trans "Жобаны құру" %}</h1>
				<form action="" method="POST" enctype="multipart/form-data" class="mt-6 space-y-5">
					{% csrf_token %}
					<div class="grid gap-4 md:grid-cols-2">
						<label class="form-control">
							<span class="label-text">{% trans "Тақырыбы" %}</span>
							{{ form.title|add_class:"input input-bordered w-full" }}
						</label>
						<label class="form-control">
							<span class="label-text">{% trans "Мекен жайы" %}</span>
							{{ form.location|add_class:"input input-bordered w-full" }}
						</label>
						<label class="form-control">
							<span class="label-text">{% trans "Санат" %}</span>
							{{ form.category|add_class:"select select-bordered w-full" }}
						</label>
						<label class="form-control">
							<span class="label-text">{% trans "Жобаның бітетін уақыты" %}</span>
							{{ form.end_date|add_class:"input input-bordered w-full" }}
						</label>
						<label class="form-control">
							<span class="label-text">{% trans "Волонтерлер саны" %}</span>
							{{ form.number_of_volunteers|add_class:"input input-bordered w-full" }}
						</label>
						<label class="form-control">
							<span class="label-text">{% trans "Фото" %}</span>
							{{ form.photo|add_class:"file-input file-input-bordered w-full" }}
						</label>
					</div>
					<label class="form-control">
						<span class="label-text">{% trans "Жобаның сипаттамасы" %}</span>
						{{ form.comment|add_class:"textarea textarea-bordered min-h-36 w-full" }}
					</label>
					<input type="submit" value='{% trans "Сақтау" %}' class="btn btn-primary w-full">
				</form>
			</div>
		</div>
	</div>
</section>
{% endblock %}
