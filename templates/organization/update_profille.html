{% extends 'base.html' %}
{% load widget_tweaks %}
{% load i18n %}

{% block content %}
<section class="px-4 pb-20 pt-32">
	<div class="mx-auto max-w-3xl">
		<div class="card border border-border/50 bg-card shadow-xl shadow-primary/5">
			<div class="card-body">
				<h1 class="text-3xl font-bold tracking-tight text-foreground">{% trans "Профильді өңдеу" %}</h1>
				<form action="" method="POST" enctype="multipart/form-data" class="mt-6 space-y-5">
					{% csrf_token %}
					<div class="grid gap-4 md:grid-cols-2">
						<label class="form-control">
							<span class="label-text">{% trans "Есімі" %}</span>
							{{ user_form.first_name|add_class:"input input-bordered w-full" }}
						</label>
						<label class="form-control">
							<span class="label-text">{% trans "Тегі" %}</span>
							{{ user_form.last_name|add_class:"input input-bordered w-full" }}
						</label>
						<label class="form-control">
							<span class="label-text">{% trans "Email" %}</span>
							{{ user_form.email|add_class:"input input-bordered w-full" }}
						</label>
						<label class="form-control">
							<span class="label-text">{% trans "Ұйымның атауы" %}</span>
							{{ form.title|add_class:"input input-bordered w-full" }}
						</label>
					</div>
					<label class="form-control">
						<span class="label-text">{% trans "Сипаттамасы" %}</span>
						{{ form.content|add_class:"textarea textarea-bordered min-h-36 w-full" }}
					</label>
					<input type="submit" value='{% trans "Сақтау" %}' class="btn btn-primary w-full">
				</form>
			</div>
		</div>
	</div>
</section>
{% endblock %}
