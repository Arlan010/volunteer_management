{% extends 'base.html' %}
{% load widget_tweaks %}
{% load i18n %}

{% load static %}

{% block content %}
<div class="container mb-3">
	<div class="row">
		<div class="col-md-5" style="margin: 0 auto">

			<h1 class="text-center">{% trans "Ұйымдарды құру" %}</h1>
			<form action="{% url 'organization:organization_create_view' %}" method="POST">
				{% csrf_token %}
				<div class="form-group">
					<LABEL>{% trans "Ұйым атауы" %}</LABEL>
					{{form.title|add_class:"form-control" }}
				</div>
				<div class="form-group">
					<label>{% trans "Сипаттамасы" %}</label>
					{{form.content|add_class:"form-control" }}
				</div>
				<input type="submit" value='{% trans "Сақтау" %}' class="w-100 btn facebook btn-primary btn-sm" name="">
			</form>
		</div>
	</div>
</div>
{% endblock %}
