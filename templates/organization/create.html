{% extends 'base.html' %}
{% load widget_tweaks %}
{% load i18n %}

{% block content %}
<section class="px-4 pb-20 pt-32">
	<div class="mx-auto max-w-xl">
		<div class="card border border-border/50 bg-card shadow-xl shadow-primary/5">
			<div class="card-body">
				<h1 class="text-3xl font-bold tracking-tight text-foreground">{% trans "Ұйымдарды құру" %}</h1>
				<form action="{% url 'organization:organization_create_view' %}" method="POST" class="mt-6 space-y-4">
					{% csrf_token %}
					<label class="form-control">
						<span class="label-text">{% trans "Ұйым атауы" %}</span>
						{{ form.title|add_class:"input input-bordered w-full" }}
					</label>
					<label class="form-control">
						<span class="label-text">{% trans "Сипаттамасы" %}</span>
						{{ form.content|add_class:"textarea textarea-bordered min-h-32 w-full" }}
					</label>
					<input type="submit" value='{% trans "Сақтау" %}' class="btn btn-primary w-full">
				</form>
			</div>
		</div>
	</div>
</section>
{% endblock %}
