{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="kk" data-theme="light">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{% block title %}Үміт Шамы - Үміт Ұшқыны | Волонтерлік платформа{% endblock %}</title>
	<link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
		rel="stylesheet">

	<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css" rel="stylesheet" type="text/css">
	<script src="https://cdn.tailwindcss.com"></script>

	<style>
		:root {
			--background: oklch(0.97 0.005 270);
			--foreground: oklch(0.25 0.05 270);
			--card: oklch(1 0 0);
			--card-foreground: oklch(0.25 0.05 270);
			--primary: oklch(0.35 0.12 270);
			--primary-foreground: oklch(0.98 0 0);
			--secondary: oklch(0.94 0.02 270);
			--secondary-foreground: oklch(0.35 0.12 270);
			--muted: oklch(0.94 0.01 270);
			--muted-foreground: oklch(0.5 0.03 270);
			--accent: oklch(0.75 0.18 55);
			--accent-foreground: oklch(0.25 0.05 55);
			--border: oklch(0.90 0.01 270);
			--radius: 0.75rem;
			--s: 92% 0.025 285;
			--sc: 32% 0.10 270;
		}

		body {
			background-color: var(--background);
			color: var(--foreground);
		}

		.text-xs {
			font-size: 0.95rem !important;
			line-height: 1.45rem !important;
		}

		.text-sm,
		.label-text,
		.label-text-alt {
			font-size: 1rem !important;
			line-height: 1.55rem !important;
		}

		.badge {
			min-height: 2rem !important;
			height: auto !important;
			padding: 0.45rem 0.8rem !important;
			font-size: 1rem !important;
			line-height: 1.35rem !important;
			white-space: normal !important;
		}

		.btn-sm {
			min-height: 2.5rem !important;
			height: auto !important;
			padding: 0.55rem 0.95rem !important;
			font-size: 1rem !important;
			line-height: 1.35rem !important;
		}

		.card-body {
			gap: 0.75rem;
		}

		.card-title {
			font-size: 1.35rem !important;
			line-height: 1.8rem !important;
		}

		.badge-secondary {
			background-color: oklch(0.92 0.025 285) !important;
			border-color: oklch(0.84 0.045 285) !important;
			color: oklch(0.32 0.10 270) !important;
		}

	</style>

	<script>
		tailwind.config = {
			theme: {
				extend: {
					fontFamily: {
						sans: ['Montserrat', 'system-ui', 'sans-serif'],
					},
					colors: {
						background: 'var(--background)',
						foreground: 'var(--foreground)',
						border: 'var(--border)',
						card: {
							DEFAULT: 'var(--card)',
							foreground: 'var(--card-foreground)',
						},
						primary: {
							DEFAULT: 'var(--primary)',
							foreground: 'var(--primary-foreground)',
						},
						secondary: {
							DEFAULT: 'var(--secondary)',
							foreground: 'var(--secondary-foreground)',
						},
						accent: {
							DEFAULT: 'var(--accent)',
							foreground: 'var(--accent-foreground)',
						},
						muted: {
							DEFAULT: 'var(--muted)',
							foreground: 'var(--muted-foreground)',
						},
					},
					borderRadius: {
						xl: 'var(--radius)',
						'2xl': 'calc(var(--radius) + 4px)',
						'3xl': 'calc(var(--radius) + 8px)',
					}
				}
			}
		}
	</script>
</head>

<body class="font-sans antialiased min-h-screen flex flex-col">

	{% include 'includes/navbar.html' %}

	<main class="flex-grow">
		{% block content %}
		{% endblock %}
	</main>

	{% include 'includes/footer.html' %}

</body>

</html>
